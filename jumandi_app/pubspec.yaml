name: jumandi_app
description: Jumandi — gas delivery booking app for customers and delivery agents.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^3.0.1
  go_router: ^14.6.2
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  intl: ^0.20.1
  google_fonts: ^6.2.1
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
