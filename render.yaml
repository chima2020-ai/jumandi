services:
  - type: web
    name: jumandi-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: Jumandi
      - key: APP_URL
        value: https://jumandi.onrender.com
      - key: BREVO_SENDER_EMAIL
        value: chiapps20@gmail.com
      - key: BREVO_SENDER_NAME
        value: jumandi
      - key: BREVO_API_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: DATABASE_URL
        fromDatabase:
          name: jumandi-db
          property: connectionString
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Jumandi Admin

databases:
  - name: jumandi-db
    plan: free
    databaseName: jumandi
    user: jumandi
